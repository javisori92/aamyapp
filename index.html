<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AAMY · Gestión Escuela de Música</title>
<style>
:root{
  --vino:#6E2439;
  --vino-dark:#4A1725;
  --vino-light:#8C3A52;
  --oceano:#0B5573;
  --oceano-light:#1C86A8;
  --dorado:#E3A72B;
  --dorado-soft:#F3D998;
  --blanco:#FFFFFF;
  --crema:#FBF8F4;
  --ink:#231C1A;
  --ink-soft:#6b5f5a;
  --line:#E7DFD6;
  --radius:18px;
  --shadow: 0 10px 30px -12px rgba(74,23,37,0.35);
  --font-display: Georgia, 'Iowan Old Style', 'Palatino Linotype', serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; font-family:var(--font-body); background:var(--crema); color:var(--ink);
  min-height:100dvh; overflow-x:hidden;
}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--dorado-soft);}

/* ---------- Staff / pentagram motif ---------- */
.staff{
  width:100%; height:22px; position:relative; margin: 4px 0 14px;
  opacity:0.55;
}
.staff::before{
  content:''; position:absolute; inset:0;
  background-image: repeating-linear-gradient(
    to bottom,
    currentColor 0, currentColor 1px, transparent 1px, transparent 5px
  );
  color: var(--vino);
  opacity:0.35;
}
.staff.gold::before{color:var(--dorado);}
.staff.ocean::before{color:var(--oceano);}

/* ---------- Login ---------- */
#login-screen{
  min-height:100dvh; display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(11,85,115,0.25), transparent 60%),
    radial-gradient(1000px 500px at 110% 110%, rgba(227,167,43,0.20), transparent 60%),
    linear-gradient(160deg, var(--vino-dark) 0%, var(--vino) 55%, var(--oceano) 130%);
  padding:24px;
}
.login-card{
  width:100%; max-width:420px; background:var(--blanco); border-radius:24px;
  box-shadow:0 30px 60px -20px rgba(0,0,0,0.5);
  padding:36px 30px 30px; position:relative; overflow:hidden;
  animation: rise .6s cubic-bezier(.2,.8,.2,1);
}
@keyframes rise{from{opacity:0; transform:translateY(24px) scale(.98)} to{opacity:1; transform:none}}
.login-card::after{
  content:''; position:absolute; top:0; left:0; right:0; height:6px;
  background:linear-gradient(90deg, var(--vino), var(--dorado), var(--oceano));
}
.brand{text-align:center; margin-bottom:6px;}
.brand .mark{
  width:56px; height:56px; margin:0 auto 10px; border-radius:16px;
  background:linear-gradient(135deg, var(--vino), var(--oceano));
  display:flex; align-items:center; justify-content:center; color:var(--dorado-soft);
  font-family:var(--font-display); font-size:28px; font-style:italic; font-weight:700;
  box-shadow: var(--shadow);
}
.brand h1{font-family:var(--font-display); font-size:26px; margin:0 0 2px; letter-spacing:.3px;}
.brand p{margin:0; color:var(--ink-soft); font-size:13px;}

.role-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:22px 0 18px;}
.role-btn{
  border:1.5px solid var(--line); background:var(--crema); border-radius:14px;
  padding:14px 8px; text-align:center; transition:.18s ease; font-size:13.5px; font-weight:600; color:var(--ink);
}
.role-btn .emoji{display:block; font-size:20px; margin-bottom:6px;}
.role-btn:hover{border-color:var(--oceano-light); transform:translateY(-2px); box-shadow:0 8px 18px -10px rgba(11,85,115,0.4);}
.role-btn.active{
  background:linear-gradient(135deg, var(--vino), var(--vino-light)); color:var(--blanco); border-color:transparent;
  box-shadow: var(--shadow);
}
.field{margin-bottom:12px;}
.field label{display:block; font-size:12px; color:var(--ink-soft); margin-bottom:5px; font-weight:600; letter-spacing:.2px;}
.field input, .field select{
  width:100%; padding:12px 14px; border-radius:12px; border:1.5px solid var(--line);
  background:var(--blanco); font-size:15px; transition:.15s;
}
.field input:focus, .field select:focus{outline:none; border-color:var(--oceano-light); box-shadow:0 0 0 4px rgba(28,134,168,0.15);}
.btn-primary{
  width:100%; padding:14px; border:none; border-radius:14px; color:var(--blanco); font-weight:700; font-size:15px;
  background:linear-gradient(135deg, var(--vino), var(--vino-light)); letter-spacing:.3px;
  transition:.15s; box-shadow:0 10px 20px -10px rgba(110,36,57,0.6);
}
.btn-primary:active{transform:scale(.97);}
.link-btn{background:none; border:none; color:var(--oceano); font-size:13px; text-decoration:underline; margin-top:14px; display:block; width:100%; text-align:center;}
.err{color:var(--vino); font-size:12.5px; margin:-4px 0 10px; min-height:14px;}

/* ---------- App shell ---------- */
#app-screen{display:none; min-height:100dvh; flex-direction:column;}
.topbar{
  position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px; background:linear-gradient(120deg, var(--vino-dark), var(--vino));
  color:var(--blanco); box-shadow:0 4px 18px -8px rgba(0,0,0,0.4);
}
.topbar .who{display:flex; align-items:center; gap:10px;}
.avatar{
  width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--dorado),var(--dorado-soft));
  display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--vino-dark); font-size:15px;
}
.who .name{font-weight:700; font-size:14.5px; line-height:1.1;}
.who .role{font-size:11.5px; opacity:.8; text-transform:uppercase; letter-spacing:.6px;}
.icon-btn{
  background:rgba(255,255,255,0.12); border:none; color:var(--blanco); width:38px; height:38px; border-radius:12px;
  display:flex; align-items:center; justify-content:center; font-size:16px; position:relative; transition:.15s;
}
.icon-btn:hover{background:rgba(255,255,255,0.22);}
.badge{
  position:absolute; top:-4px; right:-4px; background:var(--dorado); color:var(--vino-dark); font-size:10px;
  font-weight:800; width:17px; height:17px; border-radius:50%; display:flex; align-items:center; justify-content:center;
}

.layout{flex:1; display:flex; width:100%; max-width:1200px; margin:0 auto;}
.sidenav{
  width:230px; padding:20px 12px; display:none; flex-direction:column; gap:4px; border-right:1px solid var(--line);
}
.sidenav.show{display:flex;}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:11px 14px; border-radius:12px; border:none; background:none;
  text-align:left; font-size:14px; font-weight:600; color:var(--ink-soft); transition:.15s;
}
.nav-item .emoji{font-size:16px; width:20px; text-align:center;}
.nav-item:hover{background:rgba(11,85,115,0.07); color:var(--ink);}
.nav-item.active{background:linear-gradient(120deg, var(--oceano), var(--oceano-light)); color:var(--blanco); box-shadow:var(--shadow);}

.content{flex:1; padding:20px 18px 90px; min-width:0;}
.section-title{font-family:var(--font-display); font-size:22px; margin:0 0 2px;}
.section-sub{color:var(--ink-soft); font-size:13px; margin:0 0 8px;}

.card{
  background:var(--blanco); border-radius:var(--radius); padding:18px; margin-bottom:14px; border:1px solid var(--line);
  transition:.18s;
}
.card:hover{box-shadow:var(--shadow); transform:translateY(-1px);}
.card h3{margin:0 0 8px; font-size:15.5px; font-family:var(--font-display);}
.card .meta{font-size:12.5px; color:var(--ink-soft);}
.row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.chip{
  display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:999px; font-size:11.5px; font-weight:700;
  background:rgba(227,167,43,0.18); color:#8a6413;
}
.chip.blue{background:rgba(11,85,115,0.12); color:var(--oceano);}
.chip.red{background:rgba(110,36,57,0.12); color:var(--vino);}
.chip.green{background:rgba(46,140,90,0.14); color:#1f7a4d;}

.grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
@media(max-width:720px){.grid2,.grid3{grid-template-columns:1fr;}}

.progress-track{width:100%; height:10px; background:var(--line); border-radius:999px; overflow:hidden; margin-top:8px;}
.progress-fill{height:100%; background:linear-gradient(90deg, var(--oceano), var(--dorado)); border-radius:999px; transition:width .6s ease;}

.btn-sm{
  padding:8px 14px; border-radius:10px; border:1.5px solid var(--line); background:var(--crema); font-size:12.5px; font-weight:700;
  transition:.15s; color:var(--ink);
}
.btn-sm:hover{border-color:var(--oceano-light); background:var(--blanco);}
.btn-sm.solid{background:linear-gradient(120deg,var(--vino),var(--vino-light)); color:var(--blanco); border:none;}
.btn-sm.solid.ocean{background:linear-gradient(120deg,var(--oceano),var(--oceano-light));}
.btn-sm.solid.gold{background:linear-gradient(120deg,var(--dorado),#c98f1e); color:var(--vino-dark);}
.btn-sm:active{transform:scale(.95);}

.list-item{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--line);}
.list-item:last-child{border-bottom:none;}

table{width:100%; border-collapse:collapse; font-size:13px;}
th,td{padding:9px 8px; text-align:left; border-bottom:1px solid var(--line);}
th{color:var(--ink-soft); font-weight:700; font-size:11.5px; text-transform:uppercase; letter-spacing:.4px;}

.empty{text-align:center; padding:40px 20px; color:var(--ink-soft);}
.empty .emoji{font-size:34px; display:block; margin-bottom:10px;}

.modal-bg{
  position:fixed; inset:0; background:rgba(35,28,26,0.45); backdrop-filter:blur(2px); z-index:60;
  display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-bg.show{display:flex;}
.modal{
  background:var(--blanco); border-radius:20px; padding:22px; width:100%; max-width:440px; max-height:86vh; overflow:auto;
  animation: rise .3s ease;
}
.modal h3{font-family:var(--font-display); margin-top:0;}

.bottomnav{
  position:fixed; bottom:0; left:0; right:0; z-index:20; background:var(--blanco); border-top:1px solid var(--line);
  display:flex; padding:6px 4px calc(6px + env(safe-area-inset-bottom)); box-shadow:0 -6px 20px -10px rgba(0,0,0,0.15);
}
.bottomnav.hide{display:none;}
.bn-item{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:7px 2px; background:none; border:none;
  color:var(--ink-soft); font-size:10px; font-weight:700; border-radius:12px; transition:.15s;
}
.bn-item .emoji{font-size:19px;}
.bn-item.active{color:var(--vino);}
.bn-item.active .emoji{transform:translateY(-2px);}

.toast-wrap{position:fixed; top:16px; right:16px; z-index:80; display:flex; flex-direction:column; gap:8px; max-width:320px;}
.toast{
  background:var(--ink); color:var(--blanco); padding:12px 16px; border-radius:12px; font-size:13px; box-shadow:var(--shadow);
  animation: slidein .3s ease; display:flex; gap:8px; align-items:flex-start;
}
@keyframes slidein{from{opacity:0; transform:translateX(30px)} to{opacity:1; transform:none}}
.toast.gold{background:linear-gradient(120deg,var(--dorado),#c98f1e); color:var(--vino-dark);}
.toast.ocean{background:linear-gradient(120deg,var(--oceano),var(--oceano-light));}

.chat-window{display:flex; flex-direction:column; height:420px; background:var(--crema); border-radius:16px; border:1px solid var(--line); overflow:hidden;}
.chat-msgs{flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:8px;}
.msg{max-width:75%; padding:9px 13px; border-radius:16px; font-size:13.5px; line-height:1.4;}
.msg.me{align-self:flex-end; background:var(--vino); color:var(--blanco); border-bottom-right-radius:4px;}
.msg.them{align-self:flex-start; background:var(--blanco); border:1px solid var(--line); border-bottom-left-radius:4px;}
.msg .t{font-size:10px; opacity:.65; margin-top:3px; display:block;}
.chat-input{display:flex; gap:8px; padding:10px; background:var(--blanco); border-top:1px solid var(--line);}
.chat-input input{flex:1; border:1.5px solid var(--line); border-radius:20px; padding:10px 16px; font-size:13.5px;}
.chat-input button{width:40px; height:40px; border-radius:50%; border:none; background:var(--vino); color:var(--blanco); font-size:16px;}

.tag-lock{display:inline-flex; align-items:center; gap:4px; font-size:11px; color:var(--ink-soft);}

@media(min-width:860px){
  .sidenav.desktop-show{display:flex;}
  .bottomnav.desktop-hide{display:none;}
  .content{padding:26px 30px 40px;}
}
</style>
</head>

</div>

<!-- ===================== APP ===================== -->
<div id="app-screen">

  <div class="layout">

</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>

function toast(msg, kind=''){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + kind;
  el.innerHTML = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3200);
}

document.getElementById('roleGrid').addEventListener('click', e=>{
  const btn = e.target.closest('.role-btn');
  if(!btn) return;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedRole = btn.dataset.role;
  mostrarPistaLogin();
});

function mostrarPistaLogin(){
  const hint = document.getElementById('loginHint');
  const opciones = (state.users[selectedRole]||[]).map(u => u.usuario || u.email || u.name);
  hint.textContent = opciones.length ? 'Cuentas de prueba: ' + opciones.join(' · ') : '';
}

function encontrarUsuario(role, identifier){
  const id = identifier.trim().toLowerCase();
  if(!id) return null;
  return (state.users[role]||[]).find(u=>
    (u.usuario && u.usuario.toLowerCase()===id) ||
    (u.email && u.email.toLowerCase()===id) ||
    (u.name && u.name.toLowerCase()===id)
  );
}

document.getElementById('loginBtn').addEventListener('click', ()=>{
  const err = document.getElementById('loginErr');
  err.textContent = '';
  if(!selectedRole){ err.textContent='Selecciona un perfil para continuar.'; return; }
  const identifier = document.getElementById('loginIdentifier').value;
  const pass = document.getElementById('passInput').value;
  if(!identifier.trim()){ err.textContent='Indica tu usuario o correo electrónico.'; return; }
  const user = encontrarUsuario(selectedRole, identifier);
  if(!user){ err.textContent='No se encuentra ese usuario o correo en este perfil.'; return; }
  if(user.pass !== pass){ err.textContent='Contraseña incorrecta.'; return; }
  state.currentUser = {...user, role:selectedRole};
  enterApp();
});

function enterApp(){

function buildNav(){
  const items = NAV[state.currentUser.role];

  const bottom = document.getElementById('bottomNav');

  side.innerHTML = items.map(i=>`<button class="nav-item" data-k="${i.k}"><span class="emoji">${i.e}</span>${i.l}</button>`).join('');
  bottom.innerHTML = items.slice(0,5).map(i=>`<button class="bn-item" data-k="${i.k}"><span class="emoji">${i.e}</span>${i.l.split(' ')[0]}</button>`).join('');
  document.querySelectorAll('.nav-item, .bn-item').forEach(b=>{
    b.addEventListener('click', ()=>navigate(b.dataset.k));
  });
}

function navigate(key){
  currentSection = key;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.k===key));
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.toggle('active', b.dataset.k===key));
  document.getElementById('content').innerHTML = RENDER[key] ? RENDER[key]() : '<p>Sección en construcción.</p>';
  document.getElementById('content').scrollTop=0;
  window.scrollTo(0,0);
  wireSectionEvents(key);
}

function formatFecha(f){
  if(!f) return '';
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(f);
  if(!m) return f;
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(m[3],10)} ${meses[parseInt(m[2],10)-1]} ${m[1]}`;
}

function contarAsistencia(ev){
  const vals = Object.values(ev.asistencias||{});
  return {
    si: vals.filter(v=>v==='si').length,
    no: vals.filter(v=>v==='no').length,
    pendiente: vals.filter(v=>!v).length
  };
}

function tipoActuacionPuntos(tipo){
  if(tipo==='pasacalle') return PUNTOS.pasacalle;
  if(tipo==='institucional') return PUNTOS.institucional;
  return PUNTOS.concierto;
}
function tipoActuacionEmoji(tipo){
  if(tipo==='pasacalle') return '🚩 ';
  if(tipo==='institucional') return '🏛️ ';
  return '🎤 ';
}
function tipoActuacionChipClass(tipo){
  return tipo==='concierto' || !tipo ? 'blue' : 'gold';
}
function tipoActuacionChipStyle(tipo){
  return (tipo==='concierto' || !tipo) ? '' : 'background:rgba(227,167,43,.2); color:#8a6413;';
}

function musicosRelevantes(ensayo){
  return (!ensayo.cuerdas || ensayo.cuerdas[0]==='todos')

  const items = [
    ...ensayosRel.map(e=>({...e, _tipo:'ensayo', _pts:PUNTOS.ensayo, _titulo:'🎻 Ensayo'})),
    ...state.eventos.map(e=>({...e, _tipo:'actuacion', _pts: tipoActuacionPuntos(e.tipo), _titulo: tipoActuacionEmoji(e.tipo)+e.nombre}))
  ];
  return `

  <p class="section-sub">Verifica tu ubicación durante el ensayo o actuación para validar tu asistencia y sumar puntos</p>
  ${items.map(it=>{
    const estado = (it.asistencias||{})[miId];
    return `
    <div class="card">
      <div class="row"><h3>${it._titulo}</h3><span class="chip gold">${it._pts} pts</span></div>

function marcarAsistencia(tipo, id){
  const coleccion = tipo==='ensayo' ? state.ensayos : state.eventos;
  const item = coleccion.find(x=>x.id===id);
  const finish = (ok)=>{
    if(ok){
      if(!item.asistencias) item.asistencias = {};
      item.asistencias[state.currentUser.id] = 'si';
      toast('Asistencia registrada. ¡Puntos sumados! 🔥','gold');
      navigate('asistencia');
    } else {
      toast('No se ha podido verificar la ubicación.');
    }
  };
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(()=>finish(true), ()=>finish(true), {timeout:4000});
  } else finish(true);
}

function calcularRanking(){
  const conciertosTotal = state.eventos.filter(e=> (e.tipo||'concierto')==='concierto').length;
  const pasacallesTotal = state.eventos.filter(e=> e.tipo==='pasacalle').length;
  const institucionalesTotal = state.eventos.filter(e=> e.tipo==='institucional').length;
  return state.musicosBanda.map(m=>{
    const ensayosAplicables = state.ensayos.filter(e=> musicosRelevantes(e).some(r=>r.id===m.id));
    const ensayosAsistidos = ensayosAplicables.filter(e=> (e.asistencias||{})[m.id]==='si').length;
    const conciertosAsistidos = state.eventos.filter(e=> (e.tipo||'concierto')==='concierto' && (e.asistencias||{})[m.id]==='si').length;
    const pasacallesAsistidos = state.eventos.filter(e=> e.tipo==='pasacalle' && (e.asistencias||{})[m.id]==='si').length;
    const institucionalesAsistidos = state.eventos.filter(e=> e.tipo==='institucional' && (e.asistencias||{})[m.id]==='si').length;
    const puntos = ensayosAsistidos*PUNTOS.ensayo + conciertosAsistidos*PUNTOS.concierto + pasacallesAsistidos*PUNTOS.pasacalle + institucionalesAsistidos*PUNTOS.institucional;
    return {...m, puntos, ensayosAsistidos, ensayosAplicables: ensayosAplicables.length, conciertosAsistidos, conciertosTotal, pasacallesAsistidos, pasacallesTotal, institucionalesAsistidos, institucionalesTotal};
  }).sort((a,b)=>b.puntos-a.puntos);
}

function statsAsistencia(){
  const totalEnsayos = state.ensayos.length;
  const totalActuaciones = state.eventos.length;
  let sumaPctEnsayo = 0;
  state.ensayos.forEach(e=>{
    const rel = musicosRelevantes(e);
    const si = rel.filter(m=>(e.asistencias||{})[m.id]==='si').length;
    sumaPctEnsayo += rel.length ? (si/rel.length)*100 : 0;
  });
  const pctEnsayoMedio = totalEnsayos ? Math.round(sumaPctEnsayo/totalEnsayos) : 0;

  let sumaPctActuacion = 0;
  state.eventos.forEach(e=>{
    const si = state.musicosBanda.filter(m=>(e.asistencias||{})[m.id]==='si').length;
    sumaPctActuacion += state.musicosBanda.length ? (si/state.musicosBanda.length)*100 : 0;
  });
  const pctActuacionMedio = totalActuaciones ? Math.round(sumaPctActuacion/totalActuaciones) : 0;

  return {totalEnsayos, totalActuaciones, pctEnsayoMedio, pctActuacionMedio};
}

function renderRankingList(ranking){
  return ranking.map((r,i)=>`
    <div class="list-item">
      <div class="row" style="gap:12px;">
        <span class="chip ${i===0?'gold':'blue'}" style="background:${i===0?'rgba(227,167,43,.25)':''}">#${i+1}</span>
        <div>

          <div class="meta">${r.cuerda} · ${r.ensayosAsistidos}/${r.ensayosAplicables} ensayos · ${r.conciertosAsistidos}/${r.conciertosTotal} conciertos · ${r.pasacallesAsistidos}/${r.pasacallesTotal} desfiles · ${r.institucionalesAsistidos}/${r.institucionalesTotal} institucionales</div>
        </div>

      <span class="meta"><b>${r.puntos} pts</b></span>

}

function contarVotosEncuesta(enc){
  const counts = new Array(enc.opciones.length).fill(0);
  Object.values(enc.votos||{}).forEach(idx=>{ if(counts[idx]!==undefined) counts[idx]++; });
  return counts;
}
function totalVotosEncuesta(enc){ return Object.keys(enc.votos||{}).length; }
function etiquetaDestino(d){ return d==='profesor' ? 'Profesores' : d==='musico' ? 'Músicos' : 'Alumnos'; }
function etiquetaAutorEncuesta(enc){
  if(enc.rolAutor==='director') return 'Director';
  if(enc.rolAutor==='admin') return 'Administración';
  return enc.autor;
}

function renderEncuestaVotable(enc){
  const miVoto = (enc.votos||{})[state.currentUser.id];
  const counts = contarVotosEncuesta(enc);
  const total = totalVotosEncuesta(enc);
  return `
  <div class="card">
    <div class="row"><h3>${enc.pregunta}</h3><span class="chip blue">${etiquetaAutorEncuesta(enc)}</span></div>
    ${miVoto!=null ? `
      <div style="margin-top:8px;">
        ${enc.opciones.map((op,i)=>`
        <div style="margin:8px 0;">
          <div class="row" style="font-size:12.5px;"><span>${op}${i===miVoto?' ✓':''}</span><span class="meta">${counts[i]} voto(s)</span></div>
          <div class="progress-track"><div class="progress-fill" style="width:${total? Math.round(counts[i]/total*100):0}%"></div></div>
        </div>`).join('')}
      </div>`
    : `<div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;">
        ${enc.opciones.map((op,i)=>`<button class="btn-sm solid ${i%2? 'ocean':''}" onclick="votarEncuesta(${enc.id}, ${i})">${op}</button>`).join('')}
      </div>`}
  </div>`;
}

function renderEncuestaResultados(enc){
  const counts = contarVotosEncuesta(enc);
  const total = totalVotosEncuesta(enc);
  return `
  <div class="card">
    <h3>${enc.pregunta}</h3>
    <p class="meta" style="margin-bottom:8px;">${total} voto(s) · Dirigida a: ${etiquetaDestino(enc.destinatario)}</p>
    ${enc.opciones.map((op,i)=>`
      <div style="margin:8px 0;">
        <div class="row" style="font-size:12.5px;"><span>${op}</span><span class="meta">${counts[i]}</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${total? Math.round(counts[i]/total*100):0}%"></div></div>
      </div>`).join('')}
  </div>`;
}

function votarEncuesta(id, index){
  const enc = state.encuestas.find(e=>e.id===id);
  if(!enc.votos) enc.votos = {};
  enc.votos[state.currentUser.id] = index;
  toast('Voto registrado ✅','gold');
  navigate(currentSection);
}

function formNuevaEncuesta(){
  const role = state.currentUser.role;
  let destinos;
  if(role==='director') destinos = [{v:'profesor', l:'Profesores'},{v:'musico', l:'Músicos'}];
  else if(role==='admin') destinos = [{v:'profesor', l:'Profesores'},{v:'musico', l:'Músicos'},{v:'alumno', l:'Alumnos'}];
  else destinos = [{v:'alumno', l:'Tus alumnos'}];
  return `<h3>Nueva encuesta</h3>
  <div class="field"><label>Pregunta</label><input id="encPregunta" placeholder="¿Qué quieres preguntar?"></div>
  ${destinos.length>1
    ? `<div class="field"><label>Dirigida a</label><select id="encDestino">${destinos.map(d=>`<option value="${d.v}">${d.l}</option>`).join('')}</select></div>`
    : `<div class="field"><label>Dirigida a</label><input value="${destinos[0].l}" disabled style="background:var(--crema); color:var(--ink-soft);"><input type="hidden" id="encDestino" value="${destinos[0].v}"></div>`}
  <div class="field"><label>Opción 1</label><input id="encOp1" placeholder="Ej: Sí"></div>
  <div class="field"><label>Opción 2</label><input id="encOp2" placeholder="Ej: No"></div>
  <div class="field"><label>Opción 3 (opcional)</label><input id="encOp3"></div>
  <div class="field"><label>Opción 4 (opcional)</label><input id="encOp4"></div>
  <button class="btn-primary" onclick="crearEncuesta()">Publicar encuesta</button>`;
}

function crearEncuesta(){
  const pregunta = document.getElementById('encPregunta').value.trim();
  const destinatario = document.getElementById('encDestino').value;
  const opciones = ['encOp1','encOp2','encOp3','encOp4'].map(id=>document.getElementById(id).value.trim()).filter(Boolean);
  if(!pregunta || opciones.length<2){ toast('Escribe una pregunta y al menos dos opciones.'); return; }
  const u = state.currentUser;
  state.encuestas.unshift({id:Date.now(), pregunta, destinatario, opciones, votos:{}, autor:u.name, rolAutor:u.role});
  closeModal();
  navigate(currentSection);
  toast('Encuesta publicada ✅','gold');
}

function guardarInfoMusico(){
  const nombre = document.getElementById('imNombre').value.trim();
  const apellidos = document.getElementById('imApellidos').value.trim();
  const telefono = document.getElementById('imTelefono').value.trim();
  const usuario = document.getElementById('imUsuario').value.trim();
  const email = document.getElementById('imEmail').value.trim();
  const pass = document.getElementById('imPass').value;
  if(!nombre || !apellidos){ toast('Nombre y apellidos son obligatorios.'); return; }
  if(!usuario && !email){ toast('Indica al menos el usuario o el correo electrónico.'); return; }
  const name = nombre + ' ' + apellidos;
  const updates = {nombre, apellidos, name, telefono, usuario, email};
  if(pass) updates.pass = pass;
  Object.assign(state.currentUser, updates);
  const loginUser = state.users.musico.find(m=>m.id===state.currentUser.id);
  if(loginUser) Object.assign(loginUser, updates);
  const bandaUser = state.musicosBanda.find(m=>m.id===state.currentUser.id);
  if(bandaUser) Object.assign(bandaUser, {name});
  document.getElementById('topName').textContent = name;
  document.getElementById('avatarLetter').textContent = initials(name);
  navigate('infomusico');
  toast('Datos actualizados ✅','gold');
}

function formatEnsayoFecha(fechaISO){
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(fechaISO);
  if(!m) return fechaISO;
  const y=+m[1], mo=+m[2]-1, d=+m[3];
  const date = new Date(Date.UTC(y,mo,d));
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${dias[date.getUTCDay()]} ${d} ${meses[mo]}`;
}
function addEnsayo(){
  const fechaRaw = document.getElementById('ceFecha').value, hora = document.getElementById('ceHora').value, lugar = document.getElementById('ceLugar').value;
  const destino = document.getElementById('ceDestino').value;
  if(!fechaRaw||!hora||!lugar){ toast('Completa todos los campos.'); return; }
  let cuerdas = ['todos'];
  if(destino==='cuerdas'){
    cuerdas = Array.from(document.querySelectorAll('.ceCuerdaCheck:checked')).map(c=>c.value);
    if(!cuerdas.length){ toast('Selecciona al menos una cuerda.'); return; }
  }
  const fecha = formatEnsayoFecha(fechaRaw);
  state.ensayos.push({id:Date.now(), fecha, hora, lugar, cuerdas});
  navigate(state.currentUser.role==='admin'?'calendarioadmin':'calendariodirector');
  toast('Añadido al calendario ✅','gold');
}

function verDetalleActuacion(id){
  const ev = state.eventos.find(e=>e.id===id);
  const grupos = {si:[], no:[], pendiente:[]};
  state.musicosBanda.forEach(m=>{
    const st = (ev.asistencias||{})[m.id];
    if(st==='si') grupos.si.push(m.name);
    else if(st==='no') grupos.no.push(m.name);
    else grupos.pendiente.push(m.name);
  });
  const renderGrupo = (arr, vacio)=> arr.length
    ? arr.map(n=>`<div class="list-item" style="border:none; padding:5px 0;">${n}</div>`).join('')
    : `<p class="meta">${vacio}</p>`;
  openModal(`
    <h3>${ev.nombre}</h3>
    <p class="meta">📍 ${ev.lugar} · ${formatFecha(ev.fecha)} · ${ev.hora}</p>
    <div class="staff gold"></div>

    ${renderGrupo(grupos.pendiente, 'Todos han respondido.')}
  `);
}

  const horario = document.getElementById('asigHorario')?.value;
  if(!nombre){ toast('Indica el nombre de la asignatura.'); return; }
  state.asignaturas.push({id:Date.now(), nombre, profesor, tipo, horario});
  navigate('asignaturas'); toast('Asignatura creada ✅','gold');
}

RENDER.estadisticas = ()=>`
  <h2 class="section-title">Estadísticas</h2>
  <div class="grid3">
    <div class="card"><h3>${state.stats.alumnosTotal}</h3><p class="meta">Alumnos totales</p></div>
    <div class="card"><h3>${state.stats.musicosActivos}</h3><p class="meta">Músicos en activo</p></div>
    <div class="card"><h3>${state.stats.profesores}</h3><p class="meta">Profesores</p></div>
    <div class="card"><h3>${state.stats.asignaturas}</h3><p class="meta">Asignaturas</p></div>
  </div>
`;

RENDER.cuerdas = ()=>`
  <h2 class="section-title">Gestionar cuerdas</h2>
  ${state.cuerdas.map(c=>`<div class="card list-item" style="border:none;"><span>${c}</span><span class="chip blue">${state.users.musico.filter(m=>m.cuerda===c).length} músicos</span></div>`).join('')}
  <div class="card">
    <div class="field"><label>Nueva cuerda</label><input id="cuerdaNueva" placeholder="Ej: Percusión Latina"></div>
    <button class="btn-sm solid" onclick="addCuerda()">Añadir cuerda</button>
  </div>
`;
function addCuerda(){
  const v = document.getElementById('cuerdaNueva').value.trim();
  if(!v){ toast('Indica un nombre.'); return; }
  state.cuerdas.push(v); navigate('cuerdas'); toast('Cuerda creada ✅','gold');
}

function wireSectionEvents(){ /* placeholder for future event delegation */ }
</script>
</body>
</html>
